<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--
      PLY TEMPLATE — vcard type
      ─────────────────────────────────────────────────────────────────────
      Slot conventions used in this file:
        data-section="name"          → marks a logical content section
        data-slot="section.field"    → fillSlots() writes value here
                                       · <img>          → sets src
                                       · <a>            → sets href
                                       · other elements → sets textContent (text)
                                                          or innerHTML (richtext)
        data-slot-list="section.field"  → parent of a repeatable list
        data-slot-item                  → template element cloned per list value
        data-slot-optional="section.field" → hide this element when value is empty
      ─────────────────────────────────────────────────────────────────────
    -->
    <title data-slot="profile.company">My Company LYD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        /* ── Theme variables — injected by fillSlots() at render time ── */
        :root {
            --primary:      #f44336;
            --secondary:    #333333;
            --heading-font: 'Montserrat', Arial, sans-serif;
            --body-font:    'Montserrat', Arial, sans-serif;
            --radius:       0px;
        }

        body {
            font-family: var(--body-font);
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            line-height: 1.6;
        }

        .card-container {
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
            padding: 20px;
        }

        .card {
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .card-top {
            background-color: #ffffff;
            padding: 40px 20px 60px 20px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .logo {
            width: 90px;
            height: auto;
            margin-bottom: 20px;
        }

        .company-name {
            font-family: var(--heading-font);
            font-size: 1.8em;
            font-weight: 700;
            margin: 0;
            color: #1a1a1a;
        }

        .company-slogan {
            font-size: 1em;
            font-weight: 400;
            margin: 5px 0 0 0;
            color: #555;
        }

        .red-separator {
            background-color: var(--primary);
            height: 50px;
            width: 120%;
            position: absolute;
            bottom: -25px;
            left: -10%;
            border-top-left-radius: 100%;
            border-top-right-radius: 100%;
            z-index: 0;
        }

        .card-bottom {
            background-color: var(--secondary);
            color: #ffffff;
            padding: 40px 30px;
            position: relative;
            z-index: 2;
        }

        .person-name {
            font-family: var(--heading-font);
            font-size: 1.5em;
            font-weight: 600;
            margin: 0 0 5px 0;
        }

        .person-title {
            font-size: 1em;
            font-weight: 400;
            margin: 0 0 30px 0;
        }

        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .contact-item {
            display: flex;
            align-items: flex-start;
        }

        .icon {
            font-size: 1.5em;
            margin-right: 15px;
            line-height: 1;
        }

        .contact-details p {
            margin: 0;
            font-size: 0.95em;
        }

        .text-danger {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="card">

            <!-- ═══════════════════════════════════════
                 SECTION: profile
                 Fields: logo (image), company (text), tagline (text),
                         name (text), designation (text)
                 ═══════════════════════════════════════ -->
            <div class="card-top" data-section="profile">
                <img  data-slot="profile.logo"    src="https://localhost:7266/drive/uwpics/c5b48c09-bc29-430e-bea3-e2fb287f343e/logo.png" alt="Logo" class="logo" />
                <h1   data-slot="profile.company" class="company-name">My Company LYD</h1>
                <p    data-slot="profile.tagline" class="company-slogan">We build the future</p>
                <div class="red-separator"></div>
            </div>

            <div class="card-bottom">
                <div data-section="profile">
                    <h2 data-slot="profile.name"        class="person-name">Raj Kiran Singh</h2>
                    <p  data-slot="profile.designation" class="person-title">Owner</p>
                </div>

                <!-- ═══════════════════════════════════════
                     SECTION: contact
                     Fields: phone_numbers (list<text>),
                             email (text, optional),
                             address (text, optional)
                     ═══════════════════════════════════════ -->
                <div class="contact-list" data-section="contact">

                    <!-- phone_numbers — list<text>
                         data-slot-list: fillSlots() clones data-slot-item once per value -->
                    <div class="contact-item">
                        <span class="icon text-danger"><i class="bi bi-telephone-fill"></i></span>
                        <div class="contact-details" data-slot-list="contact.phone_numbers">
                            <p data-slot-item>9876543210</p>
                        </div>
                    </div>

                    <!-- email — text, optional
                         data-slot-optional: fillSlots() hides this element when value is empty -->
                    <div class="contact-item" data-slot-optional="contact.email">
                        <span class="icon text-danger"><i class="bi bi-envelope-at-fill"></i></span>
                        <div class="contact-details">
                            <p data-slot="contact.email">rajkiran.singh@gmail.com</p>
                        </div>
                    </div>

                    <!-- address — text, optional -->
                    <div class="contact-item" data-slot-optional="contact.address">
                        <span class="icon text-danger"><i class="bi bi-geo-alt-fill"></i></span>
                        <div class="contact-details">
                            <p data-slot="contact.address">H104 Ajnara Daffodil</p>
                        </div>
                    </div>

                </div>

                <!-- ═══════════════════════════════════════
                     SECTION: social_links
                     Fields per platform: link type (sets href on <a>)
                     data-slot-optional on the wrapping <span> hides the
                     icon entirely when the user leaves the URL blank.
                     ═══════════════════════════════════════ -->
                <div style="padding: 20px 0" data-section="social_links">

                    <span data-slot-optional="social_links.whatsapp" style="margin-right:5px;">
                        <a data-slot="social_links.whatsapp" href="https://wa.me/+919876543210" class="text-danger" style="text-decoration:none; font-size:1.2rem;">
                            <i class="bi bi-whatsapp"></i>
                        </a>
                    </span>

                    <span data-slot-optional="social_links.telegram" style="margin-right:5px; display:none;">
                        <a data-slot="social_links.telegram" href="#" class="text-danger" style="text-decoration:none; font-size:1.2rem;">
                            <i class="bi bi-telegram"></i>
                        </a>
                    </span>

                    <span data-slot-optional="social_links.facebook" style="margin-right:5px; display:none;">
                        <a data-slot="social_links.facebook" href="#" class="text-danger" style="text-decoration:none; font-size:1.2rem;">
                            <i class="bi bi-facebook"></i>
                        </a>
                    </span>

                    <span data-slot-optional="social_links.youtube" style="margin-right:5px; display:none;">
                        <a data-slot="social_links.youtube" href="#" class="text-danger" style="text-decoration:none; font-size:1.2rem;">
                            <i class="bi bi-youtube"></i>
                        </a>
                    </span>

                    <span data-slot-optional="social_links.twitter" style="margin-right:5px; display:none;">
                        <a data-slot="social_links.twitter" href="#" class="text-danger" style="text-decoration:none; font-size:1.2rem;">
                            <i class="bi bi-twitter"></i>
                        </a>
                    </span>

                    <span data-slot-optional="social_links.linkedin" style="margin-right:5px; display:none;">
                        <a data-slot="social_links.linkedin" href="#" class="text-danger" style="text-decoration:none; font-size:1.2rem;">
                            <i class="bi bi-linkedin"></i>
                        </a>
                    </span>

                    <span data-slot-optional="social_links.instagram" style="margin-right:5px; display:none;">
                        <a data-slot="social_links.instagram" href="#" class="text-danger" style="text-decoration:none; font-size:1.2rem;">
                            <i class="bi bi-instagram"></i>
                        </a>
                    </span>

                </div>
            </div>

            <!-- ═══════════════════════════════════════
                 SECTION: about
                 Fields: info (richtext, optional)
                 ═══════════════════════════════════════ -->
            <div class="card-top" style="text-align:justify; display:none;" data-section="about" data-slot-optional="about.info">
                <div data-slot="about.info"></div>
            </div>

        </div>
    </div>
</body>
</html>
